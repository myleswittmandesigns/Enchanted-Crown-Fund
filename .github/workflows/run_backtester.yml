name: Run Backtester

on:
  push:
    branches: [main]
    paths:
      - 'backtester.py'
      - 'STRATEGY_RULES.md'
  workflow_dispatch:  # manual trigger from GitHub UI

jobs:
  backtest:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pandas

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Run backtester
        run: |
          set -o pipefail   # fail the step if python crashes (tee would otherwise mask it)
          python backtester.py 2>&1 | tee /tmp/backtest_output.txt

      - name: Commit report
        run: |
          git add reports/
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore: auto-update backtest report [skip ci]"
          git push

name: Daily High/Low Update

on:
  schedule:
    - cron: '0 4 * * 2-6'   # 11pm ET (EDT) weekdays (after adjusted data lands)
  workflow_dispatch:          # manual trigger from GitHub UI

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install massive pandas tqdm matplotlib

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Run update
        env:
          MASSIVE_API_KEY: ${{ secrets.MASSIVE_API_KEY }}
        run: python update_data.py 2>&1 | tee /tmp/update_output.txt

      - name: "Backtest — Phase 1: BB Bollinger (all tickers)"
        run: |
          set -o pipefail
          python backtester.py --phase bb 2>&1 | tee /tmp/backtest_bb.txt

      - name: "Backtest — Phase 2: ML Multi-lookback"
        run: |
          set -o pipefail
          python backtester.py --phase ml 2>&1 | tee /tmp/backtest_ml.txt

      - name: "Backtest — Phase 3: Cross-sectional"
        run: |
          set -o pipefail
          python backtester.py --phase cs 2>&1 | tee /tmp/backtest_cs.txt

      - name: Commit data + report
        run: |
          git add data/ reports/
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore: daily data + backtest report update [skip ci]"
          git push

      - name: Send daily summary email
        env:
          SMTP_HOST:    ${{ secrets.SMTP_HOST }}
          SMTP_PORT:    ${{ secrets.SMTP_PORT }}
          SMTP_USER:    ${{ secrets.SMTP_USER }}
          SMTP_PASS:    ${{ secrets.SMTP_PASS }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
        run: python send_summary_email.py

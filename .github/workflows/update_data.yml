name: Daily High/Low Update

on:
  schedule:
    - cron: '0 22 * * 1-5'  # 6pm ET (EDT) weekdays
  workflow_dispatch:          # manual trigger from GitHub UI

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance pandas

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Run update
        id: update
        run: |
          OUTPUT=$(python update_data.py 2>&1)
          echo "$OUTPUT"
          echo "summary<<EOF" >> $GITHUB_OUTPUT
          echo "$OUTPUT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Send email notification
        run: |
          curl -X POST https://api.resend.com/emails \
            -H "Authorization: Bearer ${{ secrets.RESEND_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{
              "from": "onboarding@resend.dev",
              "to": "myleswittman@gmail.com",
              "subject": "Enchanted Crown Fund — Data Update ${{ github.run_number }}",
              "text": "Daily High/Low update completed.\n\n${{ steps.update.outputs.summary }}\n\nRun: https://github.com/myleswittmandesigns/Enchanted-Crown-Fund/actions/runs/${{ github.run_id }}"
            }'

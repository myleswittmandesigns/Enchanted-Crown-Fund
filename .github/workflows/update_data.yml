name: Daily High/Low Update

on:
  schedule:
    - cron: '0 22 * * 1-5'  # 6pm ET (EDT) weekdays
  workflow_dispatch:          # manual trigger from GitHub UI

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance pandas

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Run update
        run: python update_data.py 2>&1 | tee /tmp/update_output.txt

      - name: Send email notification
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RUN_ID: ${{ github.run_id }}
          RUN_NUMBER: ${{ github.run_number }}
        run: |
          python3 - <<'EOF'
          import json, os, urllib.request

          summary = open("/tmp/update_output.txt").read().strip()
          run_id = os.environ["RUN_ID"]
          run_number = os.environ["RUN_NUMBER"]

          body = {
              "from": "onboarding@resend.dev",
              "to": "myleswittman@gmail.com",
              "subject": f"Enchanted Crown Fund — Data Update #{run_number}",
              "text": f"Daily High/Low update completed.\n\n{summary}\n\nRun: https://github.com/myleswittmandesigns/Enchanted-Crown-Fund/actions/runs/{run_id}"
          }

          req = urllib.request.Request(
              "https://api.resend.com/emails",
              data=json.dumps(body).encode(),
              headers={
                  "Authorization": f"Bearer {os.environ['RESEND_API_KEY']}",
                  "Content-Type": "application/json"
              }
          )
          with urllib.request.urlopen(req) as resp:
              print("Resend response:", resp.status, resp.read().decode())
          EOF

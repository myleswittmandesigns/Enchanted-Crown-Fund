name: Daily High/Low Update

on:
  schedule:
    - cron: '0 22 * * 1-5'  # 6pm ET (EDT) weekdays
  workflow_dispatch:          # manual trigger from GitHub UI

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install massive pandas

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Run update
        env:
          MASSIVE_API_KEY: ${{ secrets.MASSIVE_API_KEY }}
        run: python update_data.py 2>&1 | tee /tmp/update_output.txt

      - name: Run backtester
        run: python backtester.py 2>&1 | tee /tmp/backtest_output.txt

      - name: Commit data + report
        run: |
          git add data/ reports/
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore: daily data + backtest report update [skip ci]"
          git push

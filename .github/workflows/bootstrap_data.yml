name: Bootstrap Historical Data

on:
  workflow_dispatch:
    inputs:
      start_date:
        description: 'Start date for full historical pull (YYYY-MM-DD)'
        required: true
        default: '2016-01-01'
      tickers:
        description: 'Space-separated tickers to bootstrap (leave blank for all)'
        required: false
        default: ''

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance pandas

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bootstrap full history via yfinance
        run: |
          python - <<'EOF'
          import os
          import pandas as pd
          import yfinance as yf
          from datetime import datetime

          ALL_TICKERS = [
              # Clean 50-ticker universe — screened (screen_tickers.yml) for full
              # 2016 history, ZERO splits since 2016, still actively trading.
              # 10 retained originals + 40 random qualifiers (random.seed(42)).
              "ABM", "AEIS", "AEO", "AGM", "AHRT", "AIOT", "AVNS", "AXSM", "BCBP", "BFC",
              "CAKE", "CDE", "CDXS", "CPRX", "CWBC", "CWST", "CYRX", "DDD", "DNOW", "DY",
              "ERII", "ESNT", "INVX", "IPAR", "KN", "MCS", "MOD", "NATR", "NKSH", "OI",
              "OII", "OSBC", "PLAY", "PRAA", "RDNT", "RMBS", "SAMG", "SANM", "SHAK", "SMTC",
              "SPXC", "SSTK", "STAA", "STRL", "TBRG", "TTMI", "UE", "UFPT", "VIAV", "WTBA",
          ]

          input_tickers = "${{ github.event.inputs.tickers }}".strip()
          TICKERS    = input_tickers.split() if input_tickers else ALL_TICKERS
          START_DATE = "${{ github.event.inputs.start_date }}"
          TODAY      = datetime.today().strftime("%Y-%m-%d")
          DATA_DIR   = "data"
          COLUMNS    = ["Open", "High", "Low", "Close"]

          os.makedirs(DATA_DIR, exist_ok=True)

          for ticker in TICKERS:
              print(f"Fetching {ticker} from {START_DATE} → {TODAY} ...")
              df = yf.download(
                  ticker,
                  start      = START_DATE,
                  end        = TODAY,
                  auto_adjust = True,
                  progress   = False,
              )

              if df.empty:
                  print(f"  {ticker}: no data returned — skipping")
                  continue

              # yfinance multi-level columns when downloading single ticker
              if isinstance(df.columns, pd.MultiIndex):
                  df.columns = [col[0] for col in df.columns]

              cols = [c for c in COLUMNS if c in df.columns]
              df   = df[cols].copy()
              df.index.name = "Date"
              df = df.reset_index()
              df["Date"] = pd.to_datetime(df["Date"]).dt.normalize()

              path = os.path.join(DATA_DIR, f"{ticker}_daily_high_low.csv")
              df.to_csv(path, index=False)
              print(f"  {ticker}: wrote {len(df)} rows ({df['Date'].min().date()} → {df['Date'].max().date()})")

          EOF

      - name: Commit fresh data
        run: |
          git add data/
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore: bootstrap historical data via yfinance (${{ github.event.inputs.start_date }} → today) for: ${{ github.event.inputs.tickers || 'all tickers' }}"
          git push
